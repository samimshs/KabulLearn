<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="description" content="KabulLearn is preparing a new website. Coming soon.">
    <meta property="og:title" content="KabulLearn | Coming Soon">
    <meta property="og:description" content="Our learning platform is under construction and will be available soon.">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <title>KabulLearn | Coming Soon</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='400' height='400' rx='92' fill='%230057FF'/%3E%3Cpath d='M84 112c46-14 86-6 116 24v172c-30-30-70-38-116-24Z' fill='%23FFFFFF' opacity='0.22'/%3E%3Cpath d='M200 136c30-30 70-38 116-24v172c-46-14-86-6-116 24Z' fill='%23FFFFFF' opacity='0.22'/%3E%3Cpath d='M84 112c46-14 86-6 116 24v172c-30-30-70-38-116-24Z' fill='none' stroke='%23FFFFFF' stroke-width='22' stroke-linejoin='round'/%3E%3Cpath d='M200 136c30-30 70-38 116-24v172c-46-14-86-6-116 24Z' fill='none' stroke='%23FFFFFF' stroke-width='22' stroke-linejoin='round'/%3E%3Cpath d='M200 136v172' stroke='%23FFFFFF' stroke-width='18' stroke-linecap='round'/%3E%3C/svg%3E" type="image/svg+xml">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 12%, rgba(0, 87, 255, 0.16), transparent 28%),
          radial-gradient(circle at 84% 74%, rgba(0, 87, 255, 0.10), transparent 26%),
          linear-gradient(180deg, #f7f9ff, #eef2fb 68%, #f4f8ff);
        color: #17202a;
        display: grid;
      }

      .shell {
        display: grid;
        align-content: center;
        justify-items: center;
        width: min(720px, calc(100% - 36px));
        min-height: 100vh;
        margin: 0 auto;
        padding: clamp(48px, 9vw, 96px) 0;
        text-align: center;
      }

      .logo {
        width: min(280px, 72vw);
        height: auto;
        margin-bottom: clamp(28px, 5vw, 44px);
      }

      .panel {
        display: grid;
        justify-items: center;
        gap: 18px;
      }

      .kicker {
        margin: 0;
        color: #0057FF;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .panel h1 {
        margin: 0;
        color: #0f172a;
        font-size: clamp(3.25rem, 11vw, 7rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .panel p {
        max-width: 560px;
        margin: 0;
        color: #526174;
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.75;
      }

      .email-link {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        min-height: 46px;
        margin-top: 10px;
        padding: 0 18px;
        border: 1px solid rgba(0, 87, 255, 0.18);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.76);
        color: #0057FF;
        font-weight: 800;
        text-decoration: none;
        box-shadow: 0 18px 44px rgba(28, 43, 52, 0.12);
        transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
      }

      .email-link:hover {
        border-color: rgba(0, 87, 255, 0.34);
        background: rgba(255, 255, 255, 0.94);
        transform: translateY(-1px);
      }

      .email-link svg {
        width: 18px;
        height: 18px;
        stroke-width: 2.3;
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-labelledby="coming-soon-title">
      <svg class="logo" width="760" height="180" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KabulLearn">
        <rect x="10" y="10" width="160" height="160" rx="36" fill="#0057FF"/>
        <g transform="translate(10 10) scale(0.4)">
          <path d="M84 112c46-14 86-6 116 24v172c-30-30-70-38-116-24Z" fill="#FFFFFF" opacity="0.22"/>
          <path d="M200 136c30-30 70-38 116-24v172c-46-14-86-6-116 24Z" fill="#FFFFFF" opacity="0.22"/>
          <path d="M84 112c46-14 86-6 116 24v172c-30-30-70-38-116-24Z" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linejoin="round"/>
          <path d="M200 136c30-30 70-38 116-24v172c-46-14-86-6-116 24Z" fill="none" stroke="#FFFFFF" stroke-width="22" stroke-linejoin="round"/>
          <path d="M200 136v172" stroke="#FFFFFF" stroke-width="18" stroke-linecap="round"/>
          <path d="M122 164c28-3 54 4 78 22" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.65"/>
          <path d="M122 212c28-3 54 4 78 22" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.65"/>
          <path d="M238 186c24-18 50-25 78-22" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.65"/>
          <path d="M238 234c24-18 50-25 78-22" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" opacity="0.65"/>
        </g>
        <text x="198" y="108" font-family="Manrope, Arial, Helvetica, sans-serif" font-weight="800" font-size="70" letter-spacing="-2.8" fill="#07060E">Kabul<tspan fill="#0057FF">Learn</tspan></text>
        <text x="202" y="142" font-family="Manrope, Arial, Helvetica, sans-serif" font-weight="500" font-size="16" letter-spacing="4" fill="#666580">LEARN WITHOUT LIMITS</text>
      </svg>
      <section class="panel">
        <p class="kicker">Website Under Construction</p>
        <h1 id="coming-soon-title">Coming soon...</h1>
        <p>We are preparing the KabulLearn platform and will be back online shortly.</p>
        <a class="email-link" href="mailto:info@kabullearn.com">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6.5h16v11H4v-11Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <path d="m4.5 7 7.5 6 7.5-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>info@kabullearn.com</span>
        </a>
      </section>
    </main>
  </body>
</html>
